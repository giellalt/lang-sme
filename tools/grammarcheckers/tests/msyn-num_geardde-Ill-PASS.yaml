Config:
  Spec: ../pipespec.xml
  Variants: [smegram-dev]

Tests:
  - "Ráđđehusa áigumuš lea ahte mearradoallu galgá šaddat viđa geardde stuorábun ovdal 2050."
  - "Dát mearrádus maŋiduvvui máŋgga háve."
  - "Guovllut main leat garra gáržžidusat vahátelliid bivdimii, sáhttet mielddisbuktit stuora váttisvuođaid boazodollui sivas go dát guovllut máŋgga háve leat dehálaš guohtuneatnamat."
  - "Doarjjastivra meannudii áššiid čoahkkimiin, mat ledje sullii 4-6 háve jagis."
  - "Šiehtadallamat leat máŋgga háve leamaš guovtti oasis, mas lávdegotti sámi áirasat vuosttažettiin leat bargan guovllujuoguin, ja dat earát leat fas bargan ieš dan konvenšuvdnateavstta sisdoaluin."
  - "Lávdegoddi čoahkkana njealje háve jagis."
  - "Sámediggi lea máŋgga háve cealkán, ahte sii deattuhit sámegiela giellabargguid."
  - "Máŋgga háve lea árvaluvvon váldit eret duollu ja divvagiid importerejuvvon bohccofuođđariin."
  - "Dan áššis galggai ráhkaduvvot háhkanbušeahtta ja Sámedikki kultur- ja ealáhusossodat ii sáhte máŋgga háve ruhtadit seammalágan doaimmaid."
  - "Dan lea Sámediggi máŋgga háve čujuhan ráđđehusa kulturpolitihka hárrái."
  - "Dievasčoahkkin dollojuvvo golmma háve jagis."
  - "Dábálaččat fitná Gonagas Stuoradikkis dán ovtta háve jagis."
  - "Čieža háve beaivái mun rámidan du vuoigatlaš duomuid."
  - "Muhto olusiin lei ain jáhkku Egyptii, ja judalaččat duste nágget stuorragonagasa vuostá máŋgga háve."
  - "Guovtte háve son bálkestii sáitti, muhto David lohkkii."
  - "Muhto dál don časkkát aramealaččaid dušše golmma háve."
  - "Máŋgga háve vuoigŋa lea bálkestan su sihke dollii ja čáhcái goddin dihtii su."
  - "Muhto go farao niegadii seammá guovtte háve, de dat máksá ahte Ipmil lea mearridan dan ášši ja ollašuhttá dan fargga."
  - "Máŋgga háve leamaš gal dieđušge ovdun dat ahte máhtán giela ja dovddan ruošša kultuvrra."
  - "Dát mearkkašii ahte olbmuin doppe lei 8–9 miilla mátki girkui, ja sápmelaččat bohte dušše moatti háve girkui jagis."
  - "Mun in dieđe masa dat adnojedje, muhto moatti háve dieđán ahte sii goaruhedje gápmagiid dain."
  - "Moatte háve 1990-logus fálai Finnmárkku allaskuvla sámegiela ja kultuvrra jahkebealovttadaga."
  - "Ovttas eará skuvlamánáiguin - erenoamážit singuin guđet orro verddiid luhtte skuvlaáiggi - finai son mu geahčen eahkedis moatte háve vahkkus."
  - "Moatte háve lean leamaš Johkamohkis duodjekurssas."
