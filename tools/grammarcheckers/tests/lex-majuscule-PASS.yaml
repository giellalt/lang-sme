Config:
  Spec: ../pipespec.xml
  Variants: [smegram-dev]

Tests:
  - "Stivra evttoha sámedikki čoahkkimii, ahte dat vállje sámedikki fásta lahtuin ođđa ollesáigásaš ságadoalli."
  - "Stivra mearái evttohit sámedikki čoahkkimii , ahte dat vállje bargoortnega 3 §:a ja 5 §:a mielde sámedikki fásta lahtuin ollesáigásaš ságadoalli ja dárbbu mielde várreságadoalli ja/dahje/ja ođđa stivrra lahtu."
  - "Sámediggelága 3 a čuoggái gullet njuolggadusat sámedikki ruhtadoalus ja ruhtadoallodárkkisteamis."
  - "Dan mielde sámedikki ruhtadoallobadji lea kaleandarjahki."
  - "Ruhtadoalloloahpaheami vuolláičállet sámedikki stivrra lahtut."
  - "Seammá paragráffas ásahuvvo viidásabbot, ahte ruhtadoalloloahpaheami galgá buktit sámedikki (čoahkkima) nannemiii guđege geassemánu loahpa rádjai."
  - "Suoma beale sámedikkiin, maid birra lea eambbo sáhka čuovvovaš osiin."
  - "Son hálidii iežas eatni áirrasin sámediggái."
  - "Kárášjoga joatkkaskuvlla rektor, Synnøve Solbakken-Härkönen lea ovttaoaivilis ráđđehusain ahte báikkálaš eaiggát lea buoremus, ja hálida sámediggái eaiggátvuođa."
